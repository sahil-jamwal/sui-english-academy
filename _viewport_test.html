<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>viewport harness</title>
<style>
  html,body{margin:0;background:#888}
  iframe{display:block;border:2px solid #333;box-shadow:0 0 0 1px #000}
</style>
</head>
<body>
<script>
  const params = new URLSearchParams(location.search);
  const page = params.get('page') || 'index.html';
  const w = parseInt(params.get('w')||'360',10);
  const h = parseInt(params.get('h')||'900',10);
  const f = document.createElement('iframe');
  f.src = page;
  f.width = w;
  f.height = h;
  document.body.appendChild(f);
</script>
</body></html>
